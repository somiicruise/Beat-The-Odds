<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beat The Odds</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="intro" aria-labelledby="intro-title">
        <div class="intro__inner">
          <h1 id="intro-title" class="intro__title">
            Silence kills products,<br />
            the great ones too.
          </h1>
          <p class="intro__statement">
            We make sure<br />
            people talk.
          </p>
        </div>
      </section>

      <section class="metrics" aria-label="Product visibility metrics">
        <div class="metrics__grid">
          <article class="metric-card">
            <strong>12</strong>
            <span>Campaigns launched</span>
          </article>
          <article class="metric-card">
            <strong>1.8M</strong>
            <span>Views generated</span>
          </article>
          <article class="metric-card">
            <strong>318</strong>
            <span>Deals made</span>
          </article>
          <article class="metric-card">
            <strong>7</strong>
            <span>Markets reached</span>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
